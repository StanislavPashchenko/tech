{% extends "admin/change_list.html" %}

{% block content %}
<div style="margin: 0 0 16px 0; padding: 12px; border: 1px solid #2f2f2f; border-radius: 6px;">
    <div style="font-weight: 600; margin-bottom: 10px;">Разделы техники</div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        {% for item in category_shortcuts %}
        <a href="{{ item.url }}" style="display: inline-block; padding: 6px 10px; border: 1px solid #3f3f3f; border-radius: 6px; text-decoration: none;">
            {{ item.name }}
        </a>
        {% endfor %}
    </div>
</div>
{{ block.super }}
{% endblock %}
