{% extends 'catalog/en/base.html' %}

{% block title %}Household Appliance Catalog{% endblock %}

{% block content %}
{% if show_categories %}
<div class="row">
    <div class="col-12 text-center mb-5">
        <h1>Select Category</h1>
    </div>
    {% for cat in categories %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">{{ cat.name_en }}</h5>
                <p class="text-muted small">Products: {{ cat.product_count }}</p>
                <a href="{% url 'product_section' lang cat.id_name %}" class="btn btn-primary mt-3">Go to category</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endblock %}
