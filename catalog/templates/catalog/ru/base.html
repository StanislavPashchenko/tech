<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Справочник бытовой техники{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 20px; }
        .card { height: 100%; }
        .product-image { max-height: 200px; object-fit: contain; }
        .article-image { max-height: 360px; object-fit: cover; }
        .lang-switcher { margin-left: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index_lang' 'ru' %}">TechGuide</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'index_lang' 'ru' %}">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'products_index' 'ru' %}">Товары</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'articles_index' 'ru' %}">Статьи</a></li>
                </ul>
                <form class="d-flex" action="{% url 'search' lang %}" method="get">
                    <input class="form-control me-2" type="search" name="q" placeholder="Поиск модели..." aria-label="Search" value="{{ query|default:'' }}">
                    <button class="btn btn-outline-success" type="submit">Найти</button>
                </form>
                <div class="lang-switcher">
                    <a href="{{ language_urls.ru }}" class="btn btn-sm {% if lang == 'ru' %}btn-primary{% else %}btn-outline-light{% endif %}">RU</a>
                    <a href="{{ language_urls.ua }}" class="btn btn-sm {% if lang == 'ua' %}btn-primary{% else %}btn-outline-light{% endif %}">UA</a>
                    <a href="{{ language_urls.en }}" class="btn btn-sm {% if lang == 'en' %}btn-primary{% else %}btn-outline-light{% endif %}">EN</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    <footer class="mt-5 py-3 text-center bg-white border-top"><p>&copy; 2026 Справочник бытовой техники</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
